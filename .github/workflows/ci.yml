name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_key_prefix: mise-v1
      # The mise action may restore Rust install metadata without the rustup
      # toolchain, components, or cross targets from mise.toml. Reinstall rust
      # from mise config before hk starts parallel cargo commands.
      - name: Ensure Rust toolchain
        run: MISE_NO_HOOKS=1 mise install --force rust
      - run: mise run check
      - run: mise run test
