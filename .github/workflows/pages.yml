name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_key_prefix: mise-v1
      # The mise action may restore Rust install metadata without the rustup
      # toolchain, components, or cross targets from mise.toml. Reinstall rust
      # from mise config before any task can invoke cargo through mise.
      - name: Ensure Rust toolchain
        run: MISE_NO_HOOKS=1 mise install --force rust
      - uses: actions/configure-pages@v6
      - name: Build docs
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
        run: mise run docs:build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
