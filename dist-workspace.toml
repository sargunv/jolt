[workspace]
members = ["cargo:crates/jolt_cli"]

[dist]
cargo-dist-version = "0.32.0"
ci = ["github"]
packages = ["jolt_cli"]
installers = ["shell", "powershell"]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-musl",
  "aarch64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]
github-attestations = true
cargo-auditable = true
precise-builds = true
pr-run-mode = "upload"
source-tarball = false

# cargo-dist defaults this target to cargo-xwin, whose container can lag our MSRV.
# cargo-dist documents using a Windows runner for this target:
# https://github.com/axodotdev/cargo-dist/blob/v0.32.0/CHANGELOG.md#support-cross-compiling-from-windows-to-windows
[dist.github-custom-runners.aarch64-pc-windows-msvc]
runner = "windows-2025"

[[dist.extra-artifacts]]
artifacts = ["plugin.wasm", "dprint-schema.json", "jolt-schema.json"]
build = [
  "sh",
  "-c",
  """\
set -eu
rustup target add wasm32-unknown-unknown
cargo build --release --target wasm32-unknown-unknown --package jolt_fmt_dprint --features wasm
cp target/wasm32-unknown-unknown/release/jolt_fmt_dprint.wasm plugin.wasm
cargo run --release --package jolt_cli -- config schema --dprint > dprint-schema.json
cargo run --release --package jolt_cli -- config schema > jolt-schema.json
""",
]
