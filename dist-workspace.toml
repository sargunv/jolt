[workspace]
members = ["cargo:crates/jolt_cli"]

[dist]
cargo-dist-version = "0.32.0"
packages = ["jolt_cli"]
installers = ["shell", "powershell"]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-musl",
  "aarch64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]
github-attestations = true
cargo-auditable = true
precise-builds = true
pr-run-mode = "upload"
source-tarball = false

[[dist.extra-artifacts]]
artifacts = ["plugin.wasm", "schema.json"]
build = [
  "sh",
  "-c",
  """\
set -eu
rustup target add wasm32-unknown-unknown
cargo build --release --target wasm32-unknown-unknown --package jolt_fmt_dprint --features wasm
cp target/wasm32-unknown-unknown/release/jolt_fmt_dprint.wasm plugin.wasm
cargo run --release --package jolt_dprint_schema_gen > schema.json
""",
]
