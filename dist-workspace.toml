[workspace]
members = ["dist:dist/jolt"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
packages = ["jolt_cli"]
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-musl",
  "aarch64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]
# Whether to enable GitHub Attestations
github-attestations = true
# Whether to embed dependency information using cargo-auditable
cargo-auditable = false
# Build only the required packages, and individually
precise-builds = true
# Which actions to run on pull requests
pr-run-mode = "upload"
github-build-setup = "../build-setup.yml"
# Generate and dist a source tarball
source-tarball = false
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

[dist.dependencies.apt]
musl-tools = { targets = ["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"] }

# cargo-dist defaults this target to cargo-xwin, whose container can lag our MSRV.
# cargo-dist documents using a Windows runner for this target:
# https://github.com/axodotdev/cargo-dist/blob/v0.32.0/CHANGELOG.md#support-cross-compiling-from-windows-to-windows
[dist.github-custom-runners.aarch64-pc-windows-msvc]
runner = "windows-2025"

[[dist.extra-artifacts]]
artifacts = ["plugin.wasm", "dprint-schema.json", "jolt-schema.json"]
build = [
  "sh",
  "-c",
  """\
set -eu
tools/wasm/build_optimized.sh plugin.wasm
cargo run --release --package jolt_cli -- config schema --dprint > dprint-schema.json
cargo run --release --package jolt_cli -- config schema > jolt-schema.json
""",
]
