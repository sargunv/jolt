[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"aqua:dprint/dprint" = "0.54.0"
"aqua:WebAssembly/binaryen" = "130"
"aqua:jdx/hk" = "1.48.0"
"core:java" = "zulu-25.34.17.0"
"core:python" = "3.14.5"
"core:rust" = { version = "1.96.0", profile = "minimal", components = "rustfmt,clippy,llvm-tools-preview", targets = "wasm32-unknown-unknown" }
"aqua:sharkdp/hyperfine" = "1.20.0"
"aqua:google/google-java-format" = "1.35.0"
"aqua:pnpm/pnpm" = "11.9.0"
"core:node" = "24.18.0"
"cargo:cargo-machete" = "0.9.2"
"cargo:cargo-nextest" = "0.9.138"
"cargo:cargo-dist" = "0.32.0"

[deps.pnpm]
auto = true

[deps.imports]
auto = true
sources = ["tools/import/import.py"]
outputs = ["tools/import/.imports/manifest.json"]
run = "python tools/import/import.py"

[tasks.check]
run = "hk check --all"

[tasks.test]
usage = 'flag "--update" help="Update insta snapshots"'
run = 'INSTA_UPDATE="$([ "${usage_update:-false}" = "true" ] && printf always || printf no)" cargo nextest run --workspace'

[tasks.nextest]
run = "cargo nextest run --workspace"

[tasks.machete]
run = "cargo machete"

[tasks.build]
depends = ["build:jolt", "build:dprint-plugin"]

[tasks."docs:dev"]
run = "pnpm docs:dev"

[tasks."docs:build"]
run = "pnpm docs:build"

[tasks."docs:preview"]
run = "pnpm docs:preview"

[tasks."build:jolt"]
usage = '''
flag "--mode <mode>" help="Cargo build mode" {
  choices "debug" "release"
  default "debug"
}
'''

run = '''
case "${usage_mode?}" in
  debug) cargo build --package jolt_cli ;;
  release) cargo build --package jolt_cli --release ;;
esac
'''

[tasks."build:jolt-pgo"]
description = "Build a profile-guided optimized Jolt CLI"
run = "python tools/pgo/build.py"

[tasks."jolt"]
raw_args = true
run = "cargo run -p jolt_cli --"

[tasks."build:dprint-plugin"]
usage = '''
flag "--mode <mode>" help="Cargo build mode" {
  choices "debug" "release"
  default "debug"
}
'''
run = '''
case "${usage_mode?}" in
  debug) cargo build --target wasm32-unknown-unknown --package jolt_fmt_dprint --features wasm ;;
  release) cargo build --release --target wasm32-unknown-unknown --package jolt_fmt_dprint --features wasm ;;
esac
'''

[tasks."build:dprint-plugin-optimized"]
description = "Build and post-link optimize the release dprint plugin"
run = '''
cargo build --release --target wasm32-unknown-unknown --package jolt_fmt_dprint --features wasm
wasm-opt -O3 \
  target/wasm32-unknown-unknown/release/jolt_fmt_dprint.wasm \
  -o target/wasm32-unknown-unknown/release/jolt_fmt_dprint.opt.wasm
'''

[tasks."dprint-with-jolt"]
depends = ["build:dprint-plugin"]
raw_args = true
run = "dprint --plugins=\"$PWD/target/wasm32-unknown-unknown/debug/jolt_fmt_dprint.wasm\""

[tasks.benchmark]
usage = '''
arg "[tools]" help="Benchmark tools" var=#true {
  choices "jolt" "dprint-jolt" "google-java-format" "prettier-java" "all"
}
'''
depends = [
  { task = "build:jolt", args = [
    "--mode",
    "release",
  ] },
  { task = "build:dprint-plugin", args = [
    "--mode",
    "release",
  ] },
]
run = 'python tools/bench/bench.py ${usage_tools:-}'

[tasks."release:build"]
run = '''
host=$(rustc -vV | sed -n 's/^host: //p')
case "$host" in
  aarch64-unknown-linux-gnu) target=aarch64-unknown-linux-musl ;;
  x86_64-unknown-linux-gnu) target=x86_64-unknown-linux-musl ;;
  aarch64-apple-darwin|x86_64-apple-darwin|aarch64-pc-windows-msvc|x86_64-pc-windows-msvc) target=$host ;;
  *) echo "unsupported release host: $host" >&2; exit 1 ;;
esac
dist build --target "$target"
'''

[tasks."release:cut"]
run = '''
set -eu
today=$(date -u +%Y%m%d)
latest=$(git tag -l "0.$today.*" | sort -V | tail -1)
if [ -n "$latest" ]; then
  n=$(( ${latest##*.} + 1 ))
else
  n=0
fi
version="0.$today.$n"
tag="$version"

echo "About to cut $tag"
echo "  - bump native, plugin, and dist package manifests to $version"
echo "  - sync Cargo.lock"
echo "  - git commit -m \"chore: release jolt $version\""
echo "  - git tag -m \"jolt $version\" $tag"
echo "  - git push --atomic origin HEAD $tag"
printf "Proceed? [y/N] "
read -r reply
case "$reply" in
  y|Y|yes|YES) ;;
  *) echo "Aborted"; exit 1 ;;
esac

for toml in crates/jolt_cli/Cargo.toml crates/jolt_fmt_dprint/Cargo.toml dist/jolt/dist.toml; do
  awk -v v="$version" '/^version = / && !done { print "version = \"" v "\""; done=1; next } { print }' "$toml" > "$toml.tmp" && mv "$toml.tmp" "$toml"
done
cargo metadata --format-version=1 >/dev/null

git add crates/jolt_cli/Cargo.toml crates/jolt_fmt_dprint/Cargo.toml dist/jolt/dist.toml Cargo.lock
git commit -m "chore: release jolt $version"
git tag -m "jolt $version" "$tag"
git push --atomic origin HEAD "$tag"

echo "Released $tag"
'''

[tasks.fix]
run = "hk fix --all"

[hooks]
postinstall = ["hk install --mise"]
