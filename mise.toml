[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"aqua:dprint/dprint" = "0.54.0"
"aqua:gradle/gradle" = "9.6.0"
"aqua:jdx/hk" = "1.48.0"
"core:java" = "zulu-25.34.17.0"
"core:python" = "3.14.5"
"core:rust" = { version = "1.96.0", profile = "minimal", components = "rustfmt,clippy", targets = "wasm32-unknown-unknown" }

[tasks.check]
run = "hk check --all"

[tasks.test]
run = "cargo test --workspace"

[tasks.fix]
run = "hk fix --all"

[tasks.import-fixtures]
description = "Import formatter fixture inputs and advisory reference outputs"
run = [
  "python tools/fixtures/import_fixtures.py",
  "gradle -q --project-dir tools/fixtures/formatter-harness run --args \"$PWD/.fixtures/fixtures\"",
]

[hooks]
postinstall = ["hk install --mise"]
